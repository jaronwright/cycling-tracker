<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cycling Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0b0b0e;
    --surface: #111116;
    --surface2:#18181f;
    --border:  rgba(255,255,255,0.07);
    --lime:    #c8ff00;
    --lime-dim:rgba(200,255,0,0.12);
    --lime-glow:rgba(200,255,0,0.22);
    --red:     #ff4545;
    --red-dim: rgba(255,69,69,0.12);
    --orange:  #ff8c42;
    --teal:    #00e5c8;
    --text:    #f0f0f0;
    --muted:   #5a5a6a;
    --muted2:  #3a3a48;
    --radius:  14px;
    --radius-sm: 9px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', system-ui, sans-serif;
    min-height: 100vh;
    line-height: 1.5;
    /* Grain texture */
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  }

  .app {
    max-width: 1060px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  /* ── HEADER ─────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 32px 0 28px;
    margin-bottom: 28px;
    gap: 16px;
    flex-wrap: wrap;
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, var(--lime) 0%, transparent 60%);
    opacity: 0.3;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo {
    width: 44px;
    height: 44px;
    background: var(--lime);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 20px var(--lime-glow);
  }

  .logo svg { width: 24px; height: 24px; }

  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.75rem;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text);
    line-height: 1;
  }

  h1 span { color: var(--lime); }

  .tagline {
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* ── UNIT TOGGLE ─────────────────────────────────────────── */
  .unit-toggle {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    overflow: hidden;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .unit-toggle button {
    padding: 7px 16px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .unit-toggle button.active {
    background: var(--lime);
    color: #0b0b0e;
  }

  /* ── BUTTONS ─────────────────────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    text-decoration: none;
  }

  .btn-lime {
    background: var(--lime);
    color: #0b0b0e;
    border-color: var(--lime);
  }
  .btn-lime:hover {
    box-shadow: 0 4px 16px var(--lime-glow);
    transform: translateY(-1px);
  }

  .btn-ghost {
    background: var(--surface);
    color: var(--muted);
    border-color: var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted2); }

  .btn-danger {
    background: var(--red-dim);
    color: var(--red);
    border-color: rgba(255,69,69,0.2);
  }
  .btn-danger:hover { background: rgba(255,69,69,0.2); }

  .btn-export {
    background: rgba(0,229,200,0.1);
    color: var(--teal);
    border-color: rgba(0,229,200,0.2);
  }
  .btn-export:hover { background: rgba(0,229,200,0.18); }

  /* ── TABS ────────────────────────────────────────────────── */
  .tabs {
    display: flex;
    gap: 3px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    margin-bottom: 28px;
  }

  .tab {
    flex: 1;
    padding: 10px 12px;
    text-align: center;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    border-radius: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }

  .tab:hover { color: var(--text); background: var(--surface2); }

  .tab.active {
    background: var(--lime);
    color: #0b0b0e;
    box-shadow: 0 2px 12px var(--lime-glow);
  }

  /* ── PANELS ──────────────────────────────────────────────── */
  .panel { display: none; }
  .panel.active {
    display: block;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── CARDS ───────────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--lime);
    border-radius: 2px 0 0 2px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card:hover::before { opacity: 1; }

  .card-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── FORM ────────────────────────────────────────────────── */
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(175px, 1fr));
    gap: 16px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-family: 'Barlow Condensed', sans-serif;
  }

  input, textarea, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 0.9rem;
    padding: 11px 13px;
    width: 100%;
    transition: border-color 0.2s, box-shadow 0.2s;
    font-family: 'DM Sans', sans-serif;
    -webkit-appearance: none;
  }

  input:focus, textarea:focus {
    outline: none;
    border-color: var(--lime);
    box-shadow: 0 0 0 3px var(--lime-dim);
  }

  input[readonly] { color: var(--muted); cursor: default; }

  textarea {
    resize: vertical;
    min-height: 80px;
  }

  .input-suffix { position: relative; }
  .input-suffix input { padding-right: 50px; }

  .suffix-label {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--muted2);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    pointer-events: none;
  }

  .form-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 22px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  /* ── STAT CARDS ──────────────────────────────────────────── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 18px 18px;
    transition: border-color 0.2s, transform 0.2s;
    position: relative;
    overflow: hidden;
  }

  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 0 0 var(--radius) var(--radius);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .stat-card:hover { transform: translateY(-3px); }
  .stat-card:hover::after { opacity: 1; }
  .stat-card:hover { border-color: rgba(255,255,255,0.15); }

  .stat-card.lime::after  { background: var(--lime); }
  .stat-card.teal::after  { background: var(--teal); }
  .stat-card.orange::after{ background: var(--orange); }
  .stat-card.red::after   { background: var(--red); }

  .stat-icon {
    font-size: 1.1rem;
    margin-bottom: 12px;
    opacity: 0.8;
  }

  .stat-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1;
    margin-bottom: 5px;
    color: var(--text);
  }

  .stat-card.lime .stat-value  { color: var(--lime); }
  .stat-card.teal .stat-value  { color: var(--teal); }
  .stat-card.orange .stat-value{ color: var(--orange); }
  .stat-card.red .stat-value   { color: var(--red); }

  .stat-label {
    font-size: 0.68rem;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-family: 'Barlow Condensed', sans-serif;
  }

  /* ── CHART ───────────────────────────────────────────────── */
  .chart-wrap { overflow-x: auto; }
  #chart-svg {
    display: block;
    width: 100%;
    min-width: 320px;
  }

  .chart-bar { cursor: default; transition: opacity 0.15s; }
  .chart-bar:hover { opacity: 0.75; }

  /* ── HISTORY ─────────────────────────────────────────────── */
  .history-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .history-count {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .workout-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .workout-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 56px 1fr auto;
    gap: 16px;
    align-items: center;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }

  .workout-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--lime);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .workout-item:hover {
    border-color: rgba(200,255,0,0.2);
    transform: translateX(3px);
    box-shadow: -3px 0 20px var(--lime-dim);
  }

  .workout-item:hover::before { opacity: 1; }

  .workout-date-col { text-align: center; }

  .workout-day {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--lime);
    line-height: 1;
  }

  .workout-month {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.68rem;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 0.06em;
  }

  .workout-metrics {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
  }

  .metric { display: flex; flex-direction: column; gap: 1px; }

  .metric-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .metric-lbl {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 0.06em;
    font-family: 'Barlow Condensed', sans-serif;
  }

  .workout-notes {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 6px;
    font-style: italic;
  }

  .workout-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .btn-icon {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 14px;
  }

  .btn-icon.delete {
    background: var(--red-dim);
    color: var(--red);
    border: 1px solid rgba(255,69,69,0.15);
  }
  .btn-icon.delete:hover {
    background: rgba(255,69,69,0.22);
    transform: scale(1.1);
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.4; }
  .empty-state p { font-size: 0.88rem; }

  /* ── TOAST ───────────────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 18px;
    font-size: 0.83rem;
    font-weight: 600;
    color: var(--text);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #toast.show { transform: translateY(0); opacity: 1; }

  /* ── MODAL ───────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
    backdrop-filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    transform: scale(0.94);
    transition: transform 0.22s;
  }

  .modal-overlay.show .modal { transform: scale(1); }

  .modal h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.2rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }

  .modal p { color: var(--muted); font-size: 0.875rem; margin-bottom: 22px; }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  /* ── MISC ────────────────────────────────────────────────── */
  @media (max-width: 600px) {
    h1 { font-size: 1.4rem; }
    .form-grid { grid-template-columns: 1fr 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .workout-item { grid-template-columns: 46px 1fr; }
    .workout-actions { grid-column: 1 / -1; justify-content: flex-end; }
    .tab { font-size: 0.8rem; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="5.5" cy="17.5" r="3" stroke="#0b0b0e" stroke-width="2"/>
          <circle cx="18.5" cy="17.5" r="3" stroke="#0b0b0e" stroke-width="2"/>
          <path d="M5.5 17.5L10 8l4 4 3-6" stroke="#0b0b0e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M10 8h4" stroke="#0b0b0e" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <h1>Cycling <span>Tracker</span></h1>
        <div class="tagline">Track · Analyze · Improve</div>
      </div>
    </div>
    <div class="header-actions">
      <div class="unit-toggle">
        <button id="btn-km" onclick="setUnit('km')">km</button>
        <button id="btn-mi" onclick="setUnit('mi')">mi</button>
      </div>
      <button class="btn btn-export" onclick="exportCSV()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export
      </button>
      <button class="btn btn-danger" onclick="showClearModal()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Clear
      </button>
    </div>
  </header>

  <!-- TABS -->
  <nav class="tabs">
    <button class="tab active" onclick="switchTab('log')" id="tab-log">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      Log Ride
    </button>
    <button class="tab" onclick="switchTab('stats')" id="tab-stats">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Stats
    </button>
    <button class="tab" onclick="switchTab('history')" id="tab-history">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>
      History
    </button>
  </nav>

  <!-- LOG PANEL -->
  <div class="panel active" id="panel-log">
    <div class="card">
      <div class="card-title">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        New Ride
      </div>
      <form id="workout-form" onsubmit="saveWorkout(event)">
        <div class="form-grid">
          <div class="form-group">
            <label for="inp-date">Date</label>
            <input type="date" id="inp-date" required>
          </div>
          <div class="form-group">
            <label for="inp-duration">Duration</label>
            <div class="input-suffix">
              <input type="number" id="inp-duration" min="1" max="1440" step="1" placeholder="60" required oninput="calcSpeed()">
              <span class="suffix-label">min</span>
            </div>
          </div>
          <div class="form-group">
            <label for="inp-distance" id="lbl-distance">Distance</label>
            <div class="input-suffix">
              <input type="number" id="inp-distance" min="0.1" step="0.1" placeholder="30.0" required oninput="calcSpeed()">
              <span class="suffix-label" id="dist-unit">km</span>
            </div>
          </div>
          <div class="form-group">
            <label for="inp-speed" id="lbl-speed">Avg Speed</label>
            <div class="input-suffix">
              <input type="number" id="inp-speed" readonly placeholder="—">
              <span class="suffix-label" id="speed-unit">km/h</span>
            </div>
          </div>
          <div class="form-group">
            <label for="inp-calories">Calories</label>
            <div class="input-suffix">
              <input type="number" id="inp-calories" min="0" step="1" placeholder="400">
              <span class="suffix-label">kcal</span>
            </div>
          </div>
          <div class="form-group full">
            <label for="inp-notes">Notes</label>
            <textarea id="inp-notes" placeholder="Morning ride, felt strong…"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" onclick="resetForm()">Reset</button>
          <button type="submit" class="btn btn-lime">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Save Ride
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- STATS PANEL -->
  <div class="panel" id="panel-stats">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="card">
      <div class="card-title">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Last 10 Rides — Distance
      </div>
      <div class="chart-wrap">
        <svg id="chart-svg" height="180"></svg>
      </div>
    </div>
  </div>

  <!-- HISTORY PANEL -->
  <div class="panel" id="panel-history">
    <div class="history-controls">
      <span class="history-count" id="history-count"></span>
      <button class="btn btn-export" onclick="exportCSV()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV
      </button>
    </div>
    <div class="workout-list" id="workout-list"></div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Clear All Data?</h3>
    <p>This permanently deletes your entire workout history. Cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="hideModal()">Cancel</button>
      <button class="btn btn-danger" onclick="clearAll()">Delete Everything</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
let workouts = [];
let unit = 'km';
const KM_TO_MI = 0.621371;

function load() {
  try {
    workouts = JSON.parse(localStorage.getItem('ct_workouts') || '[]');
    unit     = localStorage.getItem('ct_unit') || 'km';
  } catch(e) { workouts = []; }
}

function save() {
  localStorage.setItem('ct_workouts', JSON.stringify(workouts));
  localStorage.setItem('ct_unit', unit);
}

function toDisplay(km) { return unit === 'mi' ? km * KM_TO_MI : km; }
function toKm(val)     { return unit === 'mi' ? val / KM_TO_MI : val; }
function fmt(val, dec=1) { return Number(val).toFixed(dec); }

// ─────────────────────────────────────────────
//  Unit
// ─────────────────────────────────────────────
function setUnit(u) {
  unit = u;
  save();
  document.getElementById('btn-km').classList.toggle('active', u === 'km');
  document.getElementById('btn-mi').classList.toggle('active', u === 'mi');
  document.getElementById('lbl-distance').textContent = `Distance (${u})`;
  document.getElementById('lbl-speed').textContent    = `Avg Speed (${u}/h)`;
  document.getElementById('dist-unit').textContent    = u;
  document.getElementById('speed-unit').textContent   = `${u}/h`;
  calcSpeed();
  renderStats();
  renderHistory();
}

// ─────────────────────────────────────────────
//  Form
// ─────────────────────────────────────────────
function calcSpeed() {
  const dur  = parseFloat(document.getElementById('inp-duration').value);
  const dist = parseFloat(document.getElementById('inp-distance').value);
  const el   = document.getElementById('inp-speed');
  el.value   = (dur > 0 && dist > 0) ? fmt(dist / (dur / 60), 1) : '';
}

function initForm() {
  document.getElementById('inp-date').value = new Date().toISOString().slice(0, 10);
}

function resetForm() {
  document.getElementById('workout-form').reset();
  initForm();
  document.getElementById('inp-speed').value = '';
}

function saveWorkout(e) {
  e.preventDefault();
  const date     = document.getElementById('inp-date').value;
  const duration = parseFloat(document.getElementById('inp-duration').value);
  const distDisp = parseFloat(document.getElementById('inp-distance').value);
  const calories = parseInt(document.getElementById('inp-calories').value) || 0;
  const notes    = document.getElementById('inp-notes').value.trim();
  const distKm   = toKm(distDisp);
  const speedKmh = distKm / (duration / 60);

  workouts.unshift({ id: Date.now(), date, duration, distKm, speedKmh, calories, notes });
  save();
  resetForm();
  renderStats();
  renderHistory();
  toast('Ride saved ✓', 'lime');
  switchTab('history');
}

// ─────────────────────────────────────────────
//  Stats
// ─────────────────────────────────────────────
function renderStats() {
  const grid = document.getElementById('stats-grid');
  if (!workouts.length) {
    grid.innerHTML = `<div class="card" style="grid-column:1/-1;text-align:center;padding:44px">
      <div class="empty-icon">📊</div>
      <p style="color:var(--muted);font-size:.88rem">Log some rides to see your stats.</p>
    </div>`;
    renderChart([]);
    return;
  }

  const totalRides   = workouts.length;
  const totalDistKm  = workouts.reduce((s,w) => s + w.distKm, 0);
  const totalMin     = workouts.reduce((s,w) => s + w.duration, 0);
  const totalCal     = workouts.reduce((s,w) => s + w.calories, 0);
  const avgSpeedKmh  = totalDistKm / (totalMin / 60);
  const bestDistKm   = Math.max(...workouts.map(w => w.distKm));
  const bestSpeedKmh = Math.max(...workouts.map(w => w.speedKmh));

  const hrs = Math.floor(totalMin / 60);
  const min = totalMin % 60;
  const timeStr = hrs > 0 ? `${hrs}h ${min}m` : `${min}m`;

  const cards = [
    { icon:'🚴', label:'Total Rides',    value: totalRides,                            unit:'',         cls:'lime'   },
    { icon:'📏', label:'Total Distance', value: fmt(toDisplay(totalDistKm)),           unit: unit,      cls:'teal'   },
    { icon:'⏱',  label:'Total Time',     value: timeStr,                               unit:'',         cls:''       },
    { icon:'⚡', label:'Avg Speed',      value: fmt(toDisplay(avgSpeedKmh)),           unit:`${unit}/h`,cls:'orange' },
    { icon:'🏆', label:'Best Distance',  value: fmt(toDisplay(bestDistKm)),            unit: unit,      cls:'lime'   },
    { icon:'💨', label:'Best Speed',     value: fmt(toDisplay(bestSpeedKmh)),          unit:`${unit}/h`,cls:'teal'   },
    { icon:'🔥', label:'Calories',       value: totalCal.toLocaleString(),             unit:'kcal',     cls:'orange' },
  ];

  grid.innerHTML = cards.map(c => `
    <div class="stat-card ${c.cls}">
      <div class="stat-icon">${c.icon}</div>
      <div class="stat-value">${c.value}</div>
      <div class="stat-label">${c.label}${c.unit ? ' · ' + c.unit : ''}</div>
    </div>
  `).join('');

  renderChart(workouts.slice(0, 10).reverse());
}

// ─────────────────────────────────────────────
//  Chart
// ─────────────────────────────────────────────
function renderChart(data) {
  const svg = document.getElementById('chart-svg');
  if (!data.length) {
    svg.innerHTML = `<text x="50%" y="90" text-anchor="middle" fill="var(--muted2)" font-size="13" font-family="'DM Sans',system-ui">No data yet</text>`;
    return;
  }

  const W = 800, H = 180;
  const pL = 48, pR = 12, pT = 20, pB = 42;
  const iW = W - pL - pR, iH = H - pT - pB;
  const vals  = data.map(w => toDisplay(w.distKm));
  const maxV  = Math.max(...vals, 0.1);
  const barW  = Math.min(46, iW / data.length - 8);
  const sp    = iW / data.length;
  const lime  = '#c8ff00';
  const limeD = '#a0cc00';

  let grids = '', ylbls = '', bars = '', xlbls = '';
  for (let i = 0; i <= 4; i++) {
    const v = (maxV / 4) * i;
    const y = pT + iH - (v / maxV) * iH;
    grids += `<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;
    ylbls += `<text x="${pL-7}" y="${y+4}" text-anchor="end" fill="#3a3a48" font-size="10" font-family="'Barlow Condensed',sans-serif" font-weight="600">${fmt(v,0)}</text>`;
  }

  data.forEach((w, i) => {
    const v    = vals[i];
    const bH   = (v / maxV) * iH;
    const x    = pL + sp * i + sp / 2 - barW / 2;
    const y    = pT + iH - bH;
    const d    = new Date(w.date + 'T00:00:00');
    const lbl  = d.toLocaleDateString('en-US', { month:'short', day:'numeric' });

    bars  += `<rect class="chart-bar" x="${x}" y="${y}" width="${barW}" height="${bH}" rx="5" fill="url(#limeGrad)"/>`;
    if (bH > 22) bars += `<text x="${x+barW/2}" y="${y-5}" text-anchor="middle" fill="${limeD}" font-size="9.5" font-family="'Barlow Condensed',sans-serif" font-weight="700">${fmt(v,1)}</text>`;
    xlbls += `<text x="${x+barW/2}" y="${H-pB+15}" text-anchor="middle" fill="#3a3a48" font-size="9.5" font-family="'Barlow Condensed',sans-serif" font-weight="600">${lbl}</text>`;
  });

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML = `
    <defs>
      <linearGradient id="limeGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${lime}"/>
        <stop offset="100%" stop-color="${limeD}" stop-opacity="0.6"/>
      </linearGradient>
    </defs>
    ${grids}${ylbls}${bars}${xlbls}
    <text x="${pL}" y="${H-2}" fill="#3a3a48" font-size="9" font-family="'Barlow Condensed',sans-serif">${unit}</text>
  `;
}

// ─────────────────────────────────────────────
//  History
// ─────────────────────────────────────────────
function renderHistory() {
  const list  = document.getElementById('workout-list');
  const count = document.getElementById('history-count');
  if (!workouts.length) {
    count.textContent = 'No rides yet';
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🚴</div><p>Log your first ride to get started.</p></div>`;
    return;
  }
  count.textContent = `${workouts.length} ride${workouts.length !== 1 ? 's' : ''} logged`;
  list.innerHTML = workouts.map(w => {
    const d    = new Date(w.date + 'T00:00:00');
    const hrs  = Math.floor(w.duration / 60);
    const mins = w.duration % 60;
    const tStr = hrs > 0 ? `${hrs}h ${mins}m` : `${mins}m`;
    return `
    <div class="workout-item" id="wi-${w.id}">
      <div class="workout-date-col">
        <div class="workout-day">${d.getDate()}</div>
        <div class="workout-month">${d.toLocaleDateString('en-US',{month:'short'})}</div>
        <div class="workout-month">${d.getFullYear()}</div>
      </div>
      <div>
        <div class="workout-metrics">
          <div class="metric"><span class="metric-val">${fmt(toDisplay(w.distKm))} ${unit}</span><span class="metric-lbl">Distance</span></div>
          <div class="metric"><span class="metric-val">${tStr}</span><span class="metric-lbl">Duration</span></div>
          <div class="metric"><span class="metric-val">${fmt(toDisplay(w.speedKmh))} ${unit}/h</span><span class="metric-lbl">Avg Speed</span></div>
          ${w.calories ? `<div class="metric"><span class="metric-val">${w.calories} kcal</span><span class="metric-lbl">Calories</span></div>` : ''}
        </div>
        ${w.notes ? `<div class="workout-notes">${escHtml(w.notes)}</div>` : ''}
      </div>
      <div class="workout-actions">
        <button class="btn-icon delete" onclick="deleteWorkout(${w.id})" title="Delete">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────
//  Delete / Clear
// ─────────────────────────────────────────────
function deleteWorkout(id) {
  workouts = workouts.filter(w => w.id !== id);
  save(); renderStats(); renderHistory();
  toast('Ride deleted', 'red');
}

function showClearModal() { document.getElementById('modal-overlay').classList.add('show'); }
function hideModal()       { document.getElementById('modal-overlay').classList.remove('show'); }

function clearAll() {
  workouts = []; save(); hideModal();
  renderStats(); renderHistory();
  toast('All data cleared', 'red');
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) hideModal();
});

// ─────────────────────────────────────────────
//  Export
// ─────────────────────────────────────────────
function exportCSV() {
  if (!workouts.length) { toast('Nothing to export', 'orange'); return; }
  const headers = ['Date','Duration (min)',`Distance (${unit})`,`Avg Speed (${unit}/h)`,'Calories','Notes'];
  const rows = workouts.map(w => [
    w.date, w.duration,
    fmt(toDisplay(w.distKm), 2), fmt(toDisplay(w.speedKmh), 2),
    w.calories, `"${(w.notes||'').replace(/"/g,'""')}"`
  ].join(','));
  const csv  = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `cycling-tracker-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('CSV exported!', 'lime');
}

// ─────────────────────────────────────────────
//  Tabs
// ─────────────────────────────────────────────
function switchTab(name) {
  ['log','stats','history'].forEach(t => {
    document.getElementById(`panel-${t}`).classList.toggle('active', t === name);
    document.getElementById(`tab-${t}`).classList.toggle('active', t === name);
  });
  if (name === 'stats')   renderStats();
  if (name === 'history') renderHistory();
}

// ─────────────────────────────────────────────
//  Toast
// ─────────────────────────────────────────────
let toastTimer;
function toast(msg, type) {
  const el = document.getElementById('toast');
  const colors = { lime:'var(--lime)', red:'var(--red)', orange:'var(--orange)', teal:'var(--teal)' };
  const icons  = { lime:'✓', red:'✕', orange:'!', teal:'↓' };
  el.innerHTML = `<span style="color:${colors[type]||'var(--lime)'}">${icons[type]||'ℹ'}</span> ${msg}`;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ─────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────
(function init() {
  load();
  initForm();
  setUnit(unit);
})();
</script>
</body>
</html>
