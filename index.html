<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cycling Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #080a0f;
    --surface:      rgba(255,255,255,0.04);
    --surface2:     rgba(255,255,255,0.07);
    --border:       rgba(255,255,255,0.08);
    --accent:       #2563EB;
    --accent-dim:   rgba(37,99,235,0.15);
    --accent-glow:  rgba(37,99,235,0.35);
    --danger:       #FF4757;
    --danger-dim:   rgba(255,71,87,0.12);
    --cyan:         #00d4ff;
    --cyan-dim:     rgba(0,212,255,0.1);
    --purple:       #8b5cf6;
    --text:         #f5f0e8;
    --muted:        #6b7280;
    --muted2:       #374151;
    --radius:       16px;
    --radius-sm:    10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    min-height: 100vh;
    line-height: 1.5;
    overflow-x: hidden;
  }

  /* ── ANIMATED BACKGROUND ─────────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 15% 50%, rgba(37,99,235,0.11) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 85% 20%, rgba(0,212,255,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 50% 95%, rgba(37,99,235,0.05) 0%, transparent 60%);
    animation: bgPulse 12s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes bgPulse {
    0%   { opacity: 0.6; transform: scale(1) translateY(0); }
    50%  { opacity: 1;   transform: scale(1.04) translateY(-12px); }
    100% { opacity: 0.75; transform: scale(1.02) translateY(6px); }
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 1060px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  /* ── HERO HEADER ─────────────────────────────────────────── */
  header {
    position: relative;
    padding: 52px 0 40px;
    margin-bottom: 32px;
    overflow: hidden;
  }

  .header-mesh {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 140% 220% at -5% 50%, rgba(37,99,235,0.22) 0%, transparent 55%),
      radial-gradient(ellipse 90% 160% at 108% 30%, rgba(0,212,255,0.10) 0%, transparent 55%);
    animation: meshShift 14s ease-in-out infinite alternate;
  }

  @keyframes meshShift {
    0%   { opacity: 0.7; transform: translateX(0) scale(1); }
    100% { opacity: 1;   transform: translateX(24px) scale(1.06); }
  }

  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--cyan) 35%, transparent 65%);
    opacity: 0.45;
  }

  .header-inner {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .logo {
    width: 54px;
    height: 54px;
    background: linear-gradient(135deg, var(--accent) 0%, rgba(0,80,210,0.7) 100%);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 36px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.18);
  }

  .logo svg { width: 28px; height: 28px; }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2.3rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1;
  }

  h1 span { color: var(--accent); }

  .tagline {
    font-size: 0.7rem;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* ── UNIT TOGGLE ─────────────────────────────────────────── */
  .unit-toggle {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    font-family: 'Syne', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .unit-toggle button {
    padding: 7px 16px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .unit-toggle button.active {
    background: var(--accent);
    color: #fff;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
  }

  /* ── BUTTONS ─────────────────────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    text-decoration: none;
  }

  .btn:active { transform: scale(0.95) !important; }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn-primary:hover {
    box-shadow: 0 4px 20px var(--accent-glow);
    transform: translateY(-1px);
  }

  .btn-ghost {
    background: var(--surface);
    color: var(--muted);
    border-color: var(--border);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

  .btn-danger {
    background: var(--danger-dim);
    color: var(--danger);
    border-color: rgba(255,71,87,0.2);
  }
  .btn-danger:hover {
    background: rgba(255,71,87,0.2);
    box-shadow: 0 4px 16px rgba(255,71,87,0.2);
  }

  .btn-export {
    background: var(--cyan-dim);
    color: var(--cyan);
    border-color: rgba(0,212,255,0.2);
  }
  .btn-export:hover {
    background: rgba(0,212,255,0.15);
    box-shadow: 0 4px 16px rgba(0,212,255,0.18);
  }

  /* ── TABS ────────────────────────────────────────────────── */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 5px;
    margin-bottom: 28px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .tab {
    flex: 1;
    padding: 10px 12px;
    text-align: center;
    background: none;
    border: none;
    border-top: 2px solid transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }

  .tab:hover { color: var(--text); background: var(--surface2); }

  .tab.active {
    background: var(--accent-dim);
    color: var(--text);
    border-top: 2px solid var(--accent);
    box-shadow: 0 2px 16px var(--accent-dim);
  }

  /* ── PANELS ──────────────────────────────────────────────── */
  .panel { display: none; }
  .panel.active {
    display: block;
    animation: fadeUp 0.25s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── CARDS ───────────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    transition: border-color 0.2s;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, var(--accent), var(--cyan), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card:hover { border-color: rgba(37,99,235,0.22); }
  .card:hover::before { opacity: 0.5; }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.76rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.13em;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── FORM ────────────────────────────────────────────────── */
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(175px, 1fr));
    gap: 16px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.11em;
    font-family: 'Syne', sans-serif;
  }

  input, textarea, select {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 0.9rem;
    padding: 11px 13px;
    width: 100%;
    transition: border-color 0.2s, box-shadow 0.2s;
    font-family: 'Space Grotesk', sans-serif;
    -webkit-appearance: none;
  }

  input:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  input[readonly] { color: var(--muted); cursor: default; }

  textarea {
    resize: vertical;
    min-height: 80px;
  }

  .input-suffix { position: relative; }
  .input-suffix input { padding-right: 50px; }

  .suffix-label {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.66rem;
    font-weight: 700;
    color: var(--muted2);
    font-family: 'Syne', sans-serif;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    pointer-events: none;
  }

  .form-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 22px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  /* ── STAT CARDS (glassmorphism) ──────────────────────────── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }

  .stat-card {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.07);
    border-top: 2px solid transparent;
    border-radius: var(--radius);
    padding: 20px 18px 18px;
    transition: all 0.22s;
    position: relative;
    overflow: hidden;
  }

  .stat-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    background: radial-gradient(ellipse at 50% -20%, rgba(255,255,255,0.07) 0%, transparent 55%);
    opacity: 0;
    transition: opacity 0.22s;
    pointer-events: none;
  }

  .stat-card:hover {
    transform: translateY(-5px);
    border-color: rgba(255,255,255,0.12);
  }
  .stat-card:hover::after { opacity: 1; }

  .stat-card.blue   { border-top-color: var(--accent); }
  .stat-card.blue:hover   { box-shadow: 0 10px 36px rgba(37,99,235,0.22); }

  .stat-card.cyan   { border-top-color: var(--cyan); }
  .stat-card.cyan:hover   { box-shadow: 0 10px 36px rgba(0,212,255,0.18); }

  .stat-card.coral  { border-top-color: var(--danger); }
  .stat-card.coral:hover  { box-shadow: 0 10px 36px rgba(255,71,87,0.18); }

  .stat-card.purple { border-top-color: var(--purple); }
  .stat-card.purple:hover { box-shadow: 0 10px 36px rgba(139,92,246,0.18); }

  .stat-icon {
    font-size: 1.1rem;
    margin-bottom: 12px;
    opacity: 0.85;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1;
    margin-bottom: 5px;
    color: var(--text);
  }

  .stat-card.blue   .stat-value { color: var(--accent); }
  .stat-card.cyan   .stat-value { color: var(--cyan); }
  .stat-card.coral  .stat-value { color: var(--danger); }
  .stat-card.purple .stat-value { color: var(--purple); }

  .stat-label {
    font-size: 0.63rem;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-family: 'Space Grotesk', sans-serif;
  }

  /* ── CHART ───────────────────────────────────────────────── */
  .chart-wrap { overflow-x: auto; }
  #chart-svg {
    display: block;
    width: 100%;
    min-width: 320px;
  }

  .chart-bar {
    cursor: default;
    transition: opacity 0.15s;
    transform-box: fill-box;
    transform-origin: bottom center;
  }
  .chart-bar:hover { opacity: 0.72; }

  @keyframes barGrow {
    from { transform: scaleY(0); opacity: 0; }
    to   { transform: scaleY(1); opacity: 1; }
  }

  .anim-bar {
    animation: barGrow 0.55s cubic-bezier(0.34, 1.15, 0.64, 1) forwards;
  }

  /* ── HISTORY ─────────────────────────────────────────────── */
  .history-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .history-count {
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .workout-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .workout-item {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-top: 2px solid transparent;
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .workout-item:hover {
    border-color: rgba(37,99,235,0.28);
    border-top-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(37,99,235,0.12);
  }

  /* Pill-style date badge */
  .date-pill {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--accent-dim);
    border: 1px solid rgba(37,99,235,0.28);
    border-radius: 12px;
    padding: 8px 11px;
    min-width: 54px;
    flex-shrink: 0;
    gap: 1px;
  }

  .date-pill-day {
    font-family: 'Syne', sans-serif;
    font-size: 1.45rem;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .date-pill-mon {
    font-size: 0.58rem;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.08em;
    font-family: 'Space Grotesk', sans-serif;
  }

  .workout-content { flex: 1; min-width: 0; }

  .workout-metrics {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
  }

  .metric { display: flex; flex-direction: column; gap: 1px; }

  .metric-val {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .metric-lbl {
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 0.09em;
    font-family: 'Space Grotesk', sans-serif;
  }

  .workout-notes {
    font-size: 0.77rem;
    color: var(--muted);
    margin-top: 6px;
    font-style: italic;
  }

  .workout-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .btn-icon {
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    border: none;
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 14px;
  }

  .btn-icon.delete {
    background: var(--danger-dim);
    color: var(--danger);
    border: 1px solid rgba(255,71,87,0.15);
  }
  .btn-icon.delete:hover {
    background: rgba(255,71,87,0.22);
    transform: scale(1.1);
    box-shadow: 0 4px 14px rgba(255,71,87,0.22);
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.35; }
  .empty-state p { font-size: 0.88rem; }

  /* ── TOAST ───────────────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: rgba(14, 17, 26, 0.92);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 18px;
    font-size: 0.83rem;
    font-weight: 600;
    color: var(--text);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Grotesk', sans-serif;
  }

  #toast.show { transform: translateY(0); opacity: 1; }

  /* ── MODAL ───────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
    backdrop-filter: blur(10px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: rgba(10, 13, 20, 0.95);
    backdrop-filter: blur(32px);
    -webkit-backdrop-filter: blur(32px);
    border: 1px solid rgba(37,99,235,0.2);
    border-top: 2px solid var(--danger);
    border-radius: var(--radius);
    padding: 28px;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    transform: scale(0.94);
    transition: transform 0.22s;
  }

  .modal-overlay.show .modal { transform: scale(1); }

  .modal h3 {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 800;
    letter-spacing: 0.02em;
    margin-bottom: 10px;
    color: var(--text);
  }

  .modal p { color: var(--muted); font-size: 0.875rem; margin-bottom: 22px; }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  /* ── RESPONSIVE ──────────────────────────────────────────── */
  @media (max-width: 600px) {
    h1 { font-size: 1.75rem; }
    .form-grid { grid-template-columns: 1fr 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .workout-item { flex-wrap: wrap; }
    .workout-actions { margin-left: auto; }
    .tab { font-size: 0.78rem; gap: 5px; }
    header { padding: 36px 0 28px; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- HERO HEADER -->
  <header>
    <div class="header-mesh"></div>
    <div class="header-inner">
      <div class="header-left">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="5.5" cy="17.5" r="3" stroke="white" stroke-width="2"/>
            <circle cx="18.5" cy="17.5" r="3" stroke="white" stroke-width="2"/>
            <path d="M5.5 17.5L10 8l4 4 3-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M10 8h4" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <h1>Cycling <span>Tracker</span></h1>
          <div class="tagline">Track · Analyze · Improve</div>
        </div>
      </div>
      <div class="header-actions">
        <div class="unit-toggle">
          <button id="btn-km" onclick="setUnit('km')">km</button>
          <button id="btn-mi" onclick="setUnit('mi')">mi</button>
        </div>
        <button class="btn btn-export" onclick="exportCSV()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export
        </button>
        <button class="btn btn-danger" onclick="showClearModal()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Clear
        </button>
      </div>
    </div>
  </header>

  <!-- TABS -->
  <nav class="tabs">
    <button class="tab active" onclick="switchTab('log')" id="tab-log">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      Log Ride
    </button>
    <button class="tab" onclick="switchTab('stats')" id="tab-stats">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Stats
    </button>
    <button class="tab" onclick="switchTab('history')" id="tab-history">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>
      History
    </button>
  </nav>

  <!-- LOG PANEL -->
  <div class="panel active" id="panel-log">
    <div class="card">
      <div class="card-title">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        New Ride
      </div>
      <form id="workout-form" onsubmit="saveWorkout(event)">
        <div class="form-grid">
          <div class="form-group">
            <label for="inp-date">Date</label>
            <input type="date" id="inp-date" required>
          </div>
          <div class="form-group">
            <label for="inp-duration">Duration</label>
            <div class="input-suffix">
              <input type="number" id="inp-duration" min="1" max="1440" step="1" placeholder="60" required oninput="calcSpeed()">
              <span class="suffix-label">min</span>
            </div>
          </div>
          <div class="form-group">
            <label for="inp-distance" id="lbl-distance">Distance</label>
            <div class="input-suffix">
              <input type="number" id="inp-distance" min="0.1" step="0.1" placeholder="30.0" required oninput="calcSpeed()">
              <span class="suffix-label" id="dist-unit">km</span>
            </div>
          </div>
          <div class="form-group">
            <label for="inp-speed" id="lbl-speed">Avg Speed</label>
            <div class="input-suffix">
              <input type="number" id="inp-speed" readonly placeholder="—">
              <span class="suffix-label" id="speed-unit">km/h</span>
            </div>
          </div>
          <div class="form-group">
            <label for="inp-calories">Calories</label>
            <div class="input-suffix">
              <input type="number" id="inp-calories" min="0" step="1" placeholder="400">
              <span class="suffix-label">kcal</span>
            </div>
          </div>
          <div class="form-group full">
            <label for="inp-notes">Notes</label>
            <textarea id="inp-notes" placeholder="Morning ride, felt strong…"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" onclick="resetForm()">Reset</button>
          <button type="submit" class="btn btn-primary">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Save Ride
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- STATS PANEL -->
  <div class="panel" id="panel-stats">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="card">
      <div class="card-title">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Last 10 Rides — Distance
      </div>
      <div class="chart-wrap">
        <svg id="chart-svg" height="180"></svg>
      </div>
    </div>
  </div>

  <!-- HISTORY PANEL -->
  <div class="panel" id="panel-history">
    <div class="history-controls">
      <span class="history-count" id="history-count"></span>
      <button class="btn btn-export" onclick="exportCSV()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV
      </button>
    </div>
    <div class="workout-list" id="workout-list"></div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Clear All Data?</h3>
    <p>This permanently deletes your entire workout history. Cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="hideModal()">Cancel</button>
      <button class="btn btn-danger" onclick="clearAll()">Delete Everything</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
let workouts = [];
let unit = 'km';
const KM_TO_MI = 0.621371;

function load() {
  try {
    workouts = JSON.parse(localStorage.getItem('ct_workouts') || '[]');
    unit     = localStorage.getItem('ct_unit') || 'km';
  } catch(e) { workouts = []; }
}

function save() {
  localStorage.setItem('ct_workouts', JSON.stringify(workouts));
  localStorage.setItem('ct_unit', unit);
}

function toDisplay(km) { return unit === 'mi' ? km * KM_TO_MI : km; }
function toKm(val)     { return unit === 'mi' ? val / KM_TO_MI : val; }
function fmt(val, dec=1) { return Number(val).toFixed(dec); }

// ─────────────────────────────────────────────
//  Unit
// ─────────────────────────────────────────────
function setUnit(u) {
  unit = u;
  save();
  document.getElementById('btn-km').classList.toggle('active', u === 'km');
  document.getElementById('btn-mi').classList.toggle('active', u === 'mi');
  document.getElementById('lbl-distance').textContent = `Distance (${u})`;
  document.getElementById('lbl-speed').textContent    = `Avg Speed (${u}/h)`;
  document.getElementById('dist-unit').textContent    = u;
  document.getElementById('speed-unit').textContent   = `${u}/h`;
  calcSpeed();
  renderStats();
  renderHistory();
}

// ─────────────────────────────────────────────
//  Form
// ─────────────────────────────────────────────
function calcSpeed() {
  const dur  = parseFloat(document.getElementById('inp-duration').value);
  const dist = parseFloat(document.getElementById('inp-distance').value);
  const el   = document.getElementById('inp-speed');
  el.value   = (dur > 0 && dist > 0) ? fmt(dist / (dur / 60), 1) : '';
}

function initForm() {
  document.getElementById('inp-date').value = new Date().toISOString().slice(0, 10);
}

function resetForm() {
  document.getElementById('workout-form').reset();
  initForm();
  document.getElementById('inp-speed').value = '';
}

function saveWorkout(e) {
  e.preventDefault();
  const date     = document.getElementById('inp-date').value;
  const duration = parseFloat(document.getElementById('inp-duration').value);
  const distDisp = parseFloat(document.getElementById('inp-distance').value);
  const calories = parseInt(document.getElementById('inp-calories').value) || 0;
  const notes    = document.getElementById('inp-notes').value.trim();
  const distKm   = toKm(distDisp);
  const speedKmh = distKm / (duration / 60);

  workouts.unshift({ id: Date.now(), date, duration, distKm, speedKmh, calories, notes });
  save();
  resetForm();
  renderStats();
  renderHistory();
  toast('Ride saved ✓', 'blue');
  switchTab('history');
}

// ─────────────────────────────────────────────
//  Stats
// ─────────────────────────────────────────────
function renderStats() {
  const grid = document.getElementById('stats-grid');
  if (!workouts.length) {
    grid.innerHTML = `<div class="card" style="grid-column:1/-1;text-align:center;padding:44px">
      <div class="empty-icon">📊</div>
      <p style="color:var(--muted);font-size:.88rem">Log some rides to see your stats.</p>
    </div>`;
    renderChart([]);
    return;
  }

  const totalRides   = workouts.length;
  const totalDistKm  = workouts.reduce((s,w) => s + w.distKm, 0);
  const totalMin     = workouts.reduce((s,w) => s + w.duration, 0);
  const totalCal     = workouts.reduce((s,w) => s + w.calories, 0);
  const avgSpeedKmh  = totalDistKm / (totalMin / 60);
  const bestDistKm   = Math.max(...workouts.map(w => w.distKm));
  const bestSpeedKmh = Math.max(...workouts.map(w => w.speedKmh));

  const hrs = Math.floor(totalMin / 60);
  const min = totalMin % 60;
  const timeStr = hrs > 0 ? `${hrs}h ${min}m` : `${min}m`;

  const cards = [
    { icon:'🚴', label:'Total Rides',    value: totalRides,                  unit:'',         cls:'blue'   },
    { icon:'📏', label:'Total Distance', value: fmt(toDisplay(totalDistKm)), unit: unit,      cls:'cyan'   },
    { icon:'⏱',  label:'Total Time',     value: timeStr,                     unit:'',         cls:''       },
    { icon:'⚡', label:'Avg Speed',      value: fmt(toDisplay(avgSpeedKmh)), unit:`${unit}/h`,cls:'purple' },
    { icon:'🏆', label:'Best Distance',  value: fmt(toDisplay(bestDistKm)),  unit: unit,      cls:'blue'   },
    { icon:'💨', label:'Best Speed',     value: fmt(toDisplay(bestSpeedKmh)),unit:`${unit}/h`,cls:'cyan'   },
    { icon:'🔥', label:'Calories',       value: totalCal.toLocaleString(),   unit:'kcal',     cls:'coral'  },
  ];

  grid.innerHTML = cards.map(c => `
    <div class="stat-card ${c.cls}">
      <div class="stat-icon">${c.icon}</div>
      <div class="stat-value">${c.value}</div>
      <div class="stat-label">${c.label}${c.unit ? ' · ' + c.unit : ''}</div>
    </div>
  `).join('');

  renderChart(workouts.slice(0, 10).reverse());
}

// ─────────────────────────────────────────────
//  Chart
// ─────────────────────────────────────────────
function renderChart(data) {
  const svg = document.getElementById('chart-svg');
  if (!data.length) {
    svg.innerHTML = `<text x="50%" y="90" text-anchor="middle" fill="#374151" font-size="13" font-family="'Space Grotesk',system-ui">No data yet</text>`;
    return;
  }

  const W = 800, H = 180;
  const pL = 48, pR = 12, pT = 20, pB = 42;
  const iW = W - pL - pR, iH = H - pT - pB;
  const vals = data.map(w => toDisplay(w.distKm));
  const maxV = Math.max(...vals, 0.1);
  const barW = Math.min(46, iW / data.length - 8);
  const sp   = iW / data.length;

  let grids = '', ylbls = '', bars = '', xlbls = '';

  for (let i = 0; i <= 4; i++) {
    const v = (maxV / 4) * i;
    const y = pT + iH - (v / maxV) * iH;
    grids += `<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>`;
    ylbls += `<text x="${pL-7}" y="${y+4}" text-anchor="end" fill="#374151" font-size="10" font-family="'Space Grotesk',sans-serif" font-weight="600">${fmt(v,0)}</text>`;
  }

  data.forEach((w, i) => {
    const v     = vals[i];
    const bH    = (v / maxV) * iH;
    const x     = pL + sp * i + sp / 2 - barW / 2;
    const y     = pT + iH - bH;
    const d     = new Date(w.date + 'T00:00:00');
    const lbl   = d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
    const delay = (i * 0.07).toFixed(2);

    bars  += `<rect class="chart-bar anim-bar" x="${x}" y="${y}" width="${barW}" height="${bH}" rx="5" fill="url(#blueGrad)" style="animation-delay:${delay}s"/>`;
    if (bH > 22) bars += `<text x="${x+barW/2}" y="${y-5}" text-anchor="middle" fill="#00d4ff" font-size="9.5" font-family="'Space Grotesk',sans-serif" font-weight="600">${fmt(v,1)}</text>`;
    xlbls += `<text x="${x+barW/2}" y="${H-pB+15}" text-anchor="middle" fill="#374151" font-size="9.5" font-family="'Space Grotesk',sans-serif" font-weight="600">${lbl}</text>`;
  });

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML = `
    <defs>
      <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#2563EB" stop-opacity="0.85"/>
      </linearGradient>
    </defs>
    ${grids}${ylbls}${bars}${xlbls}
    <text x="${pL}" y="${H-2}" fill="#374151" font-size="9" font-family="'Space Grotesk',sans-serif">${unit}</text>
  `;
}

// ─────────────────────────────────────────────
//  History
// ─────────────────────────────────────────────
function renderHistory() {
  const list  = document.getElementById('workout-list');
  const count = document.getElementById('history-count');
  if (!workouts.length) {
    count.textContent = 'No rides yet';
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🚴</div><p>Log your first ride to get started.</p></div>`;
    return;
  }
  count.textContent = `${workouts.length} ride${workouts.length !== 1 ? 's' : ''} logged`;
  list.innerHTML = workouts.map(w => {
    const d    = new Date(w.date + 'T00:00:00');
    const hrs  = Math.floor(w.duration / 60);
    const mins = w.duration % 60;
    const tStr = hrs > 0 ? `${hrs}h ${mins}m` : `${mins}m`;
    return `
    <div class="workout-item" id="wi-${w.id}">
      <div class="date-pill">
        <div class="date-pill-day">${d.getDate()}</div>
        <div class="date-pill-mon">${d.toLocaleDateString('en-US',{month:'short'})}</div>
        <div class="date-pill-mon">${d.getFullYear()}</div>
      </div>
      <div class="workout-content">
        <div class="workout-metrics">
          <div class="metric"><span class="metric-val">${fmt(toDisplay(w.distKm))} ${unit}</span><span class="metric-lbl">Distance</span></div>
          <div class="metric"><span class="metric-val">${tStr}</span><span class="metric-lbl">Duration</span></div>
          <div class="metric"><span class="metric-val">${fmt(toDisplay(w.speedKmh))} ${unit}/h</span><span class="metric-lbl">Avg Speed</span></div>
          ${w.calories ? `<div class="metric"><span class="metric-val">${w.calories} kcal</span><span class="metric-lbl">Calories</span></div>` : ''}
        </div>
        ${w.notes ? `<div class="workout-notes">${escHtml(w.notes)}</div>` : ''}
      </div>
      <div class="workout-actions">
        <button class="btn-icon delete" onclick="deleteWorkout(${w.id})" title="Delete">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────
//  Delete / Clear
// ─────────────────────────────────────────────
function deleteWorkout(id) {
  workouts = workouts.filter(w => w.id !== id);
  save(); renderStats(); renderHistory();
  toast('Ride deleted', 'coral');
}

function showClearModal() { document.getElementById('modal-overlay').classList.add('show'); }
function hideModal()       { document.getElementById('modal-overlay').classList.remove('show'); }

function clearAll() {
  workouts = []; save(); hideModal();
  renderStats(); renderHistory();
  toast('All data cleared', 'coral');
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) hideModal();
});

// ─────────────────────────────────────────────
//  Export
// ─────────────────────────────────────────────
function exportCSV() {
  if (!workouts.length) { toast('Nothing to export', 'cyan'); return; }
  const headers = ['Date','Duration (min)',`Distance (${unit})`,`Avg Speed (${unit}/h)`,'Calories','Notes'];
  const rows = workouts.map(w => [
    w.date, w.duration,
    fmt(toDisplay(w.distKm), 2), fmt(toDisplay(w.speedKmh), 2),
    w.calories, `"${(w.notes||'').replace(/"/g,'""')}"`
  ].join(','));
  const csv  = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `cycling-tracker-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('CSV exported!', 'cyan');
}

// ─────────────────────────────────────────────
//  Tabs
// ─────────────────────────────────────────────
function switchTab(name) {
  ['log','stats','history'].forEach(t => {
    document.getElementById(`panel-${t}`).classList.toggle('active', t === name);
    document.getElementById(`tab-${t}`).classList.toggle('active', t === name);
  });
  if (name === 'stats')   renderStats();
  if (name === 'history') renderHistory();
}

// ─────────────────────────────────────────────
//  Toast
// ─────────────────────────────────────────────
let toastTimer;
function toast(msg, type) {
  const el = document.getElementById('toast');
  const colors = { blue:'var(--accent)', coral:'var(--danger)', cyan:'var(--cyan)', orange:'#f59e0b' };
  const icons  = { blue:'✓', coral:'✕', cyan:'↓', orange:'!' };
  el.innerHTML = `<span style="color:${colors[type]||'var(--accent)'}">${icons[type]||'ℹ'}</span> ${msg}`;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ─────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────
(function init() {
  load();
  initForm();
  setUnit(unit);
})();
</script>
</body>
</html>
